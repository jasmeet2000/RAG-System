<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - RAG System</title>
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/pages/upload.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>RAG System</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html">Dashboard</a>
                <a href="chat.html">Chat</a>
                <a href="upload.html" class="active">Upload</a>
                <a href="search.html">Search</a>
                <a href="analytics.html">Analytics</a>
                <a href="settings.html">Settings</a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <header class="top-header">
                <h1>Document Ingestion</h1>
                <div class="header-actions">
                    <button id="theme-toggle" aria-label="Toggle Theme">🌓</button>
                </div>
            </header>

            <main class="main-content upload-content">
                <section class="upload-section">
                    <div id="dropzone" class="dropzone">
                        <div class="dropzone-content">
                            <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                            </svg>
                            <h3>Drag & Drop files here</h3>
                            <p>or click to browse</p>
                            <span class="supported-formats">Supported: PDF, DOCX, TXT, MD</span>
                            <input type="file" id="file-input" multiple accept=".pdf,.docx,.txt,.md" hidden>
                        </div>
                    </div>
                </section>

                <section class="upload-progress-section">
                    <h2>Upload Queue</h2>
                    <ul id="upload-list" class="upload-list">
                        <!-- File upload items injected here -->
                    </ul>
                    <hr style="margin-top: 2rem;">
                </section>

                <section class="recent-uploads-section" style="margin-top: 2rem;">
                    <h2>Recent Uploads</h2>
                    <ul id="recent-uploads-list" class="upload-list" style="margin-top: 1rem;">
                        <!-- Recent uploads injected here via JS -->
                    </ul>
                    <div class="pagination-controls" id="upload-pagination" style="display: none;">
                        <button class="pagination-btn" id="upload-prev" disabled>Previous</button>
                        <span class="pagination-info" id="upload-page-info">Page 1</span>
                        <button class="pagination-btn" id="upload-next">Next</button>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script type="module" src="assets/js/config.js"></script>
    <script type="module" src="assets/js/utils.js"></script>
    <script type="module" src="assets/js/api.js"></script>
    <script type="module" src="assets/js/pages/upload.js"></script>
</body>

</html>
